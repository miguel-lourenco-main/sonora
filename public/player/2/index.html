alNodeId\":\"start\",\"nodes\":{\"start\":{\"id\":\"start\",\"text\":\"Before you stands the legendary Mystic Mountain, its snow-capped peaks piercing the clouds like ancient spears thrust into the heavens. Swirling mists dance around its middle reaches, hiding secrets that have drawn seekers and mystics for countless generations. The mountain's presence feels alive, almost sentient, as if it's evaluating your worthiness to climb its sacred slopes. Local legends speak of powerful artifacts and ancient wisdom hidden within its depths, but also of those who ventured forth and never returned. As you stand at its base, the mountain's energy pulses through the ground beneath your feet, calling you to begin your ascent.\",\"nextNodeId\":\"mountain_base\",\"voiceId\":\"default\"},\"mountain_base\":{\"id\":\"mountain_base\",\"text\":\"Two paths lie before you: ancient stone steps worn smooth by countless pilgrims, and a misty mountain trail that winds into the swirling fog. Each promises its own challenges and revelations.\",\"choices\":[{\"text\":\"Follow the ancient stone steps\",\"nextNodeId\":\"stone_steps\"},{\"text\":\"Take the misty mountain trail\",\"nextNodeId\":\"misty_trail\"}],\"voiceId\":\"default\"},\"stone_steps\":{\"id\":\"stone_steps\",\"text\":\"You choose the ancient stone steps. Each one bears intricate carvings that glow faintly at your touch, pulsing with the wisdom of ages. The higher you climb, the more you feel the mountain's ancient power flowing through the very stone beneath your feet.\",\"nextNodeId\":\"mountain_sage\",\"voiceId\":\"default\"},\"misty_trail\":{\"id\":\"misty_trail\",\"text\":\"The misty trail embraces you in its ethereal veil. Shapes and shadows dance in the fog around you, and the path seems to shift with each step. Yet somehow, you sense you're being guided toward something significant.\",\"nextNodeId\":\"crystal_cave\",\"voiceId\":\"default\"},\"mountain_sage\":{\"id\":\"mountain_sage\",\"text\":\"In a small alcove carved into the mountainside, you encounter an elderly sage. His white robes seem to shimmer with their own inner light, and his eyes hold the depth of centuries. Ancient scrolls and crystalline artifacts surround him, each one pulsing with mysterious energy. As he turns his knowing gaze upon you, you sense that this meeting is no coincidence.\",\"nextNodeId\":\"sage_quest\",\"voiceId\":\"default\"},\"crystal_cave\":{\"id\":\"crystal_cave\",\"text\":\"The cave entrance sparkles with embedded crystals of every color imaginable, each one pulsing with its own rhythm of light. The air here feels charged with ancient power, and the crystals seem to sing a haunting melody that resonates deep within your soul. As you step inside, the crystals' light intensifies, revealing patterns and symbols etched into the walls that seem to shift and change as you watch.\",\"nextNodeId\":\"cave_discovery\",\"voiceId\":\"default\"},\"sage_quest\":{\"id\":\"sage_quest\",\"text\":\"The mountain sage speaks in a voice that echoes with the weight of ages: 'The sacred crystal you seek is both blessing and burden, young seeker. It maintains the delicate balance of energies that keep this mountain, and the lands beyond, in harmony. But dark forces gather, seeking to harness its power for their own ends. The choice before you is greater than you know - will you take up this burden, knowing the dangers that come with it? Or do you wish to learn more of what awaits on this treacherous path?' His eyes pierce into yours, waiting for your response.\",\"choices\":[{\"text\":\"Accept the quest for the sacred crystal\",\"nextNodeId\":\"accept_mission\"},{\"text\":\"Request more details about the journey\",\"nextNodeId\":\"seek_wisdom\"}],\"voiceId\":\"default\"},\"cave_discovery\":{\"id\":\"cave_discovery\",\"text\":\"Deep within the crystal cave, you find yourself in a vast chamber that takes your breath away. Massive crystal formations reach from floor to ceiling like frozen waterfalls of light, each one thrumming with ancient power. On one side, a particular cluster of crystals pulses with an almost hypnotic rhythm, their light dancing in patterns that seem to tell a story. On the other, the cave walls are covered in intricate paintings that seem to move in the crystalline light - depicting the mountain's history and perhaps its future. The air is thick with magic, and you can feel the weight of your next choice pressing upon you.\",\"choices\":[{\"text\":\"Explore the glowing crystal formations\",\"nextNodeId\":\"crystal_path\"},{\"text\":\"Study the ancient cave paintings\",\"nextNodeId\":\"painting_study\"}],\"voiceId\":\"default\"},\"accept_mission\":{\"id\":\"accept_mission\",\"text\":\"With unwavering resolve, you accept the sacred duty. The sage's eyes gleam with approval as he guides you toward the summit path.\",\"nextNodeId\":\"summit_path\",\"voiceId\":\"default\"},\"seek_wisdom\":{\"id\":\"seek_wisdom\",\"text\":\"You choose to seek deeper understanding. The sage nods approvingly and shares ancient secrets that will guide your journey to the summit.\",\"nextNodeId\":\"summit_path\",\"voiceId\":\"default\"},\"crystal_path\":{\"id\":\"crystal_path\",\"text\":\"Following the crystal's pulsing light, you navigate deeper into the mountain's heart, each step illuminated by their ethereal glow.\",\"nextNodeId\":\"sacred_chamber\",\"voiceId\":\"default\"},\"painting_study\":{\"id\":\"painting_study\",\"text\":\"The ancient paintings reveal a story of balance and power, guiding you toward the mountain's sacred chamber with newfound understanding.\",\"nextNodeId\":\"sacred_chamber\",\"voiceId\":\"default\"},\"summit_path\":{\"id\":\"summit_path\",\"text\":\"The path to the summit narrows, with swirling mists below and the crystal's power growing stronger above.\",\"nextNodeId\":\"final_choice\",\"voiceId\":\"default\"},\"sacred_chamber\":{\"id\":\"sacred_chamber\",\"text\":\"You enter the sacred chamber, where the very air thrums with power. The final choice lies befor
