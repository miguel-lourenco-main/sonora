"start\",\"nodes\":{\"start\":{\"id\":\"start\",\"text\":\"Between life and death there is a library, and within that library, the shelves go on forever. Every book provides a chance to try another life you could have lived. To see how things would be if you had made other choices... Would you have done anything different, if you had the chance to undo your regrets?\",\"nextNodeId\":\"library-intro\",\"voiceId\":\"default\"},\"library-intro\":{\"id\":\"library-intro\",\"text\":\"Nora Seed stands before the infinite shelves of the Midnight Library, each book representing a different version of her life. The librarian, Mrs. Elm, explains that Nora can try as many lives as she wants until she finds the one that makes her want to stay. But time is running out, and with each life she tries, the library begins to fade.\",\"choices\":[{\"text\":\"Try the life where she became a glaciologist\",\"nextNodeId\":\"glaciologist-life\"},{\"text\":\"Try the life where she stayed with her fiancé\",\"nextNodeId\":\"fiance-life\"},{\"text\":\"Try the life where she became a rock star\",\"nextNodeId\":\"rockstar-life\"}],\"voiceId\":\"default\"},\"glaciologist-life\":{\"id\":\"glaciologist-life\",\"text\":\"In this life, Nora became a glaciologist and is now in the Arctic, studying climate change. She feels fulfilled by her work but isolated from human connection. The ice around her is melting faster than ever, and she realizes that even in this 'perfect' life, there are still challenges and regrets.\",\"nextNodeId\":\"life-reflection\",\"voiceId\":\"default\"},\"fiance-life\":{\"id\":\"fiance-life\",\"text\":\"In this life, Nora married her fiancé Dan and they have children together. She's a stay-at-home mother, but feels trapped and unfulfilled. The relationship has grown stale, and she realizes that the grass isn't always greener on the other side.\",\"nextNodeId\":\"life-reflection\",\"voiceId\":\"default\"},\"rockstar-life\":{\"id\":\"rockstar-life\",\"text\":\"In this life, Nora became a famous rock star with her band. She's living the dream with fame, fortune, and adoring fans. But the pressure is overwhelming, and she's struggling with addiction and the loss of her authentic self.\",\"nextNodeId\":\"life-reflection\",\"voiceId\":\"default\"},\"life-reflection\":{\"id\":\"life-reflection\",\"text\":\"After experiencing different versions of her life, Nora begins to understand that no life is perfect. Each choice comes with its own set of challenges and rewards. The library starts to fade as she realizes that the life she wants to live is the one where she can make peace with her regrets and find meaning in the present moment.\",\"nextNodeId\":\"final-choice\",\"voiceId\":\"default\"},\"final-choice\":{\"id\":\"final-choice\",\"text\":\"The Midnight Library is disappearing around her. Mrs. Elm appears one last time and asks: 'What do you want to do with your life?' Nora must decide whether to return to her original life with new understanding, or try one more different path.\",\"choices\":[{\"text\":\"Return to my original life with new perspective\",\"nextNodeId\":\"return-home\"},{\"text\":\"Try one more life - the one where I became a philosophy professor\",\"nextNodeId\":\"philosophy-life\"}],\"voiceId\":\"default\"},\"philosophy-life\":{\"id\":\"philosophy-life\",\"text\":\"In this final life, Nora is a philosophy professor, helping students explore the meaning of existence. She's found her calling in teaching others about life's big questions. But even here, she realizes that fulfillment comes not from the perfect life, but from accepting and making the most of whatever life you have.\",\"nextNodeId\":\"return-home\",\"voiceId\":\"default\"},\"return-home\":{\"id\":\"return-home\",\"text\":\"Nora wakes up in her original life, but now she sees it with fresh eyes. She understands that every life has value, and that the key to happiness isn't finding the perfect life, but learning to appreciate the life you have. She decides to start living with intention, making choices that align with her values, and finding joy in the small moments that make life worth living.\",\"voiceId\":\"default\"}}}}],\"currentChapter\":1,\"totalChapters\":1},\"initialVoiceId\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"15:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n13:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"1\",{\"children\":\"Story Player\"}],[\"$\",\"meta\",\"2\",{\"name\":\"description\",\"content\":\"Sonora is the best way to create stories for your kids on the fly. It provides the necessary tools to create a story, without the hassle of building it from scratch.\"}],[\"$\",\"meta\",\"3\",{\"name\":\"application-name\",\"content\":\"Sonora\"}],[\"$\",\"link\",\"4\",{\"rel\":\"manifest\",\"href\":\"/manifest.json\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"5\",{\"property\":\"og:title\",\"content\":\"Sonora - The most creative Gen AI stories\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:description\",\"content\":\"Sonora is the best way to create stories for your kids on the fly. It provides the necessary tools to create a story, without the hassle of building it from scratch.\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:url\",\"content\":\"https://sonora.edgen.co/\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:site_name\",\"content\":\"Sonora\"}],[\"$\",\"meta\",\"9\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"10\",{\"name\":\"twitter:title\",\"content\":\"Sonora - The most creative Gen AI stories\"}],[\"$\",\"meta\",\"11\",{\"name\":\"twitter:description\",\"content\":\"Sonora is the best way to create stories for your kids on the fly. It provides the necessary tools to create a story, without the hassle of building it from scratch.\"}],[\"$\",\"link\",\"12\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"256x256\"}],[\"$\",\"link\",\
