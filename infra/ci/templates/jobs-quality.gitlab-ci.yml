    - echo "Waiting for Next.js server to be ready..."
    - timeout 60 bash -c 'until curl -f http://localhost:3000 > /dev/null 2>&1; do echo "Waiting for server..."; sleep 2; done'
    - echo "Next.js server is ready!"
  script:
    - cd apps/e2e
    - export NEXT_PUBLIC_INBUCKET_URL=http://docker:54324
