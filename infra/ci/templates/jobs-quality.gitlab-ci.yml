# Export translatable_content -> apps/web/public/locales/**/tc_*.json and push to the MR branch (DB wins).
# CI/CD variables (masked): SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, TRANSLATION_SYNC_ACCOUNT_ID
# Git push: use token-in-URL (Bearer in http.extraHeader often fails with "could not read Username").
#   - Prefer GITLAB_TOKEN (PAT with api or write_repository) as oauth2:<token>@host
#   - Else CI_JOB_TOKEN as gitlab-ci-token:<token>@host (enable "CI job token can push" in project CI/CD settings).
# Fork MRs are skipped (no secrets on fork pipelines).
sync_translations:
  stage: sync
  extends: .node22_pnpm
  resource_group: translation-sync-mr-$CI_MERGE_REQUEST_IID
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    GIT_DEPTH: "0"
  script:
    - |
      set -e
      pnpm translations:sync:locales
      git config user.email "gitlab-ci@${CI_SERVER_HOST}"
      git config user.name "GitLab CI"
      git add apps/web/public/locales
      if git diff --staged --quiet; then
        echo "No locale changes to commit."
        exit 0
      fi
      git commit -m "chore(i18n): sync translatable_content to locale files"
      if [ -n "${GITLAB_TOKEN:-}" ]; then
        git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      git push origin "HEAD:${CI_COMMIT_REF_NAME}"

lint_job:
  stage: lint
  extends:
    - .rule_mr_to_main_only
  extends:
    - .node18_pnpm
  script:
    - pnpm lint

typecheck_job:
  stage: typecheck
  extends:
    - .node18_pnpm
  script:
    - pnpm typecheck

build_job:
  stage: build
  extends:
    - .node18_pnpm
  script:
    - pnpm build

test:
  stage: test
  extends:
    - .rule_mr_to_main_only
  image: node:18.18.0
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apt-get update && apt-get install -y docker.io curl
    - sleep 10
