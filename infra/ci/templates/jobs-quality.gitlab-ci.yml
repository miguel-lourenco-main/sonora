# Export translatable_content -> apps/web/public/locales/**/tc_*.json and push to the MR branch (DB wins).
# CI/CD variables (masked): SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, TRANSLATION_SYNC_ACCOUNT_ID
# Git push: use token-in-URL (Bearer in http.extraHeader often fails with "could not read Username").
#   - Prefer GITLAB_TOKEN (PAT with api or write_repository) as oauth2:<token>@host
#   - Else CI_JOB_TOKEN as gitlab-ci-token:<token>@host (enable "CI job token can push" in project CI/CD settings).
# Fork MRs are skipped (no secrets on fork pipelines).
lint_job:
  stage: lint
  extends:
    - .rule_mr_to_main_only
  extends:
    - .node18_pnpm
  script:
    - pnpm lint

typecheck_job:
  stage: typecheck
  extends:
    - .node18_pnpm
  script:
    - pnpm typecheck

build_job:
  stage: build
  extends:
    - .node18_pnpm
  script:
    - pnpm build