    - curl -fsSL https://github.com/supabase/cli/releases/download/v1.204.6/supabase_1.204.6_linux_amd64.tar.gz | tar -xz && mv supabase /usr/local/bin/supabase
    - corepack enable
    - corepack prepare pnpm@9.12.0 --activate
    - pnpm install --frozen-lockfile
    - cd apps/e2e && pnpm exec playwright install --with-deps && cd ../..
    - pnpm supabase:web:start
    - pnpm supabase:web:reset
    - echo "Waiting for Supabase to be fully ready..."
    - sleep 15
    - curl -f http://docker:54321/rest/v1/ || (echo "Supabase API not ready" && exit 1)
    - curl -f http://docker:54324/api/v1/messages || (echo "Supabase Email service not ready" && exit 1)
    - echo "Building web app and starting Next.js production server (dev overlay blocks E2E clicks)..."
    - |
      export NEXT_PUBLIC_SUPABASE_URL=http://docker:54321
      export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      export SUPABASE_SECRET_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      export SUPABASE_JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long
      export NEXT_PUBLIC_INBUCKET_URL=http://docker:54324
      export PLAYWRIGHT_TEST_MODE=true
      export NEXT_PUBLIC_CI=true
      export EMAIL_SENDER=o-guardanapo1@gmail.com
      export NEXT_PUBLIC_LOG_LEVEL=debug
      export TEST_TIER=fast
      export NEXT_PUBLIC_THEME_COLOR="#ffffff"
      export NEXT_PUBLIC_DEFAULT_LANGUAGE=en
      export NEXT_PUBLIC_SITE_URL=http://localhost:3000
      export NEXT_PUBLIC_DEFAULT_CURRENCY=USD
      NODE_ENV=production pnpm --filter web build
      cd apps/web
