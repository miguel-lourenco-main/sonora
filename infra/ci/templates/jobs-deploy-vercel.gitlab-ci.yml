# Vercel preview / production: do not use `vercel link` in CI (CLI bug with --yes).
# Do not hand-write .vercel/project.json (only orgId+projectId -> "Could not retrieve Project Settings").
# Use `vercel pull` first (official CI flow) so the CLI gets full project settings from the API.
# GitLab CI/CD variables: VERCEL_TOKEN (masked), VERCEL_ORG_ID (team_...), VERCEL_PROJECT_ID (prj_...)
# Token: https://vercel.com/account/tokens - must have access to the team/project.

deploy_preview:
  stage: deploy_preview
  image: node:22
  rules:
    - if: '$ENABLE_VERCEL_DEPLOY != "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME !~ /^ci-fix\//'
  script:
    - |
      set -e
      echo "Vercel preview: vercel pull (preview) then vercel deploy --yes."
      npm install --global vercel
      if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
        echo "Missing VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID in CI/CD variables."
        exit 1
      fi
      VERCEL_ORG_ID="$(printf '%s' "$VERCEL_ORG_ID" | tr -d '\r\n')"
      VERCEL_PROJECT_ID="$(printf '%s' "$VERCEL_PROJECT_ID" | tr -d '\r\n')"
      export VERCEL_ORG_ID VERCEL_PROJECT_ID
      rm -rf .vercel
      vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
      vercel deploy --yes --token "$VERCEL_TOKEN"
  needs:
    - test

deploy_production:
  stage: deploy_production
  image: node:22
  rules:
    - if: '$ENABLE_VERCEL_DEPLOY != "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
  script:
    - |
      set -e
      echo "Vercel production: vercel pull (production) then vercel deploy --prod --yes."
      npm install --global vercel
      if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
        echo "Missing VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID in CI/CD variables."
        exit 1
      fi
      VERCEL_ORG_ID="$(printf '%s' "$VERCEL_ORG_ID" | tr -d '\r\n')"
      VERCEL_PROJECT_ID="$(printf '%s' "$VERCEL_PROJECT_ID" | tr -d '\r\n')"
      export VERCEL_ORG_ID VERCEL_PROJECT_ID
      rm -rf .vercel
      vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      vercel deploy --prod --yes --token="$VERCEL_TOKEN"
  needs:
    - build_job
